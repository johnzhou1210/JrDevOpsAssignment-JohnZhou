name: Run Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy Upload Token (upload will fail if empty)
      UPLOAD_TOKEN: "1234567890abcdef"
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # CLI call to make sure the build and upload scripts are executable
      - name: Make scripts executable
        run: |
          chmod +x build.sh
          chmod +x upload.sh

      # CLI call to simulated build process
      - name: Run Build
        run: |
          appName="Test App"
          ./build.sh --platform Android --project-name "$appName"

      # CLI call to simulated upload process
      # Modify later with an if statement to adjust flags based on platform
      - name: Upload
          run: |
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -R
          ./upload.sh android "build/Android"
