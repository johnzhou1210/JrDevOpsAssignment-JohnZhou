name: Run Build

on:
  workflow_dispatch:
    inputs:
      force_upload:
        description: "Force upload even if config has not changed. Expects true or false."
        required: false
        default: "false"
  push:
    # Use of AI for recall how to set up a push trigger for the main branch
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy Upload Token (upload will fail if empty)
      UPLOAD_TOKEN: "1234567890abcdef"
      FORCE_UPLOAD: ${{ github.event.inputs.force_upload }}
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          # Fetch full history to access previous commits for app.config
          fetch-depth: 0

      # Load app name and version data from ../app.config
      - name: Load app configuration
        # Use of AI to recall how to set environment variables from a file in a GitHub Actions workflow
        run: |
          source ../app.config
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "PROFILE=${PROFILE}" >> $GITHUB_ENV
          echo "PLATFORM=${PLATFORM}" >> $GITHUB_ENV
          echo "Loaded app configuration: Name=${APP_NAME}, Version=${APP_VERSION}, Profile=${PROFILE}, Platform=${PLATFORM}"

      # CLI call to make sure the build and upload scripts are executable
      - name: Make scripts executable
        run: |
          chmod +x build.sh
          chmod +x upload.sh
          echo "Scripts are now executable."

      # CLI call to simulated build process
      - name: Run Build
        run: |
          if [[ "$PROFILE" == "true" ]]; then
            ./build.sh --platform "${PLATFORM}" --project-name "${APP_NAME}" --version "${APP_VERSION}" --profile
          else
            ./build.sh --platform "${PLATFORM}" --project-name "${APP_NAME}" --version "${APP_VERSION}"
          fi
          echo "Build process completed."

      # CLI call to simulated upload process
      - name: Upload
        run: |
          # If FORCE_UPLOAD is not set because workflow ran automatically, default it to false.
          FORCE_UPLOAD="${FORCE_UPLOAD:-false}"

          # Only upload if current config file is different from previous config file
          # AI assistance used to determine how to extract previous contents from app.config from git history
          # PREV_CONFIG will be an empty string if there is no previous config (first commit), so we will treat that as a config change and proceed with upload

          PREV_CONFIG=$(git show HEAD~1:app.config 2>/dev/null || echo "")
          CURR_CONFIG=$(cat ../app.config)
          echo "Previous config: $PREV_CONFIG"
          echo "Current config: $CURR_CONFIG"

          if [[ "$PREV_CONFIG" == "$CURR_CONFIG" && "$FORCE_UPLOAD" == "false" ]]; then
            echo "Config file has not changed since last commit, skipping upload."
            exit 0
          fi

          echo "Proceeding to upload artifacts."
          # Use of AI to recall bash for loop syntax
          if [[ "$PLATFORM" == "Android" ]]; then
            echo "Uploading Android artifacts..."
            for file in ./build/${PLATFORM}/*; do
              echo "Uploading file: $file"
              ./upload.sh android "$file"
            done
          elif [[ "$PLATFORM" == "iOS" ]]; then
            echo "Uploading iOS artifacts..."
            for file in ./build/${PLATFORM}/* ./build/${PLATFORM}/Assets/*; do
              [[ -f "$file" ]] || continue
              echo "Uploading file: $file"
              ./upload.sh ios "$file"
            done
          else
            echo "Invalid platform specified: $PLATFORM. Expected 'iOS' or 'Android'."
            exit 1
          fi
          echo "Upload process completed for all artifacts."
