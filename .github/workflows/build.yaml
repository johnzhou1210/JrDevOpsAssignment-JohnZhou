name: Run Build

on:
  workflow_dispatch:

  push:
    # Use of AI for recall how to set up a push trigger for the main branch
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy Upload Token (upload will fail if empty)
      UPLOAD_TOKEN: "1234567890abcdef"
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # Load app name and version data from ../app.config
      - name: Load app configuration
        # Use of AI to recall how to set environment variables from a file in a GitHub Actions workflow
        run: |
          source ../app.config
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "Loaded app configuration: Name=${APP_NAME}, Version=${APP_VERSION}"

      # CLI call to make sure the build and upload scripts are executable
      - name: Make scripts executable
        run: |
          chmod +x build.sh
          chmod +x upload.sh
          echo "Scripts are now executable."

      # CLI call to simulated build process
      - name: Run Build
        run: |
          ./build.sh --platform Android --project-name "${APP_NAME}" --version "${APP_VERSION}"
          echo "Build process completed."

      # CLI call to simulated upload process
      # Modify later with an if statement to adjust flags based on platform
      - name: Upload
        run: |
          # Only upload if current version is different from previous version
          # AI assistance used to determine how to extract previous version from app.config from git history
          # Gets previous commit, looks at app.config, finds line with APP_VERSION, and extracts the second field when split by double quotes
          # This should contain the verison number (example: 0.1.2)
          # PREV_VERSION will be an empty string if there is no previous version (first commit), so we will treat that as a version change and proceed with upload

          PREV_VERSION=$(git show HEAD~1:app.config 2>/dev/null | grep APP_VERSION | cut -d '"' -f2 || echo "")
          echo "Previous version: $PREV_VERSION"
          echo "Current version: $APP_VERSION"

          if [[ "$APP_VERSION" == "$PREV_VERSION" ]]; then
            echo "Version has not changed, skipping upload."
            exit 0
          fi

          echo "Version has changed, proceeding with upload."
          # Use of AI to recall for loop syntax
          for file in ./build/Android/*; do
            echo "Uploading file: $file"
            ./upload.sh android "$file"
          done
          echo "Upload process completed for all artifacts."
